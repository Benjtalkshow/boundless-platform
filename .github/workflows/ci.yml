name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so only the latest commit is checked.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Non-secret placeholders so env validation and the production build run
# without real secrets. Deploys supply real values from the platform.
env:
  BACKEND_URL: http://localhost:8000
  STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
  NEXT_PUBLIC_API_BASE_PATH: /api
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_STELLAR_NETWORK: TESTNET

jobs:
  quality:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Next 16's build no longer lints, so lint runs explicitly here.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Playwright boots `npm run dev` itself (CI disables server reuse).
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
